# ============================================================================
# Termux Extra Keys — "Developer PC" Layout
# ============================================================================
# Row 1 (top):  ESC  TAB  ⌫BKSP  ⌦DEL  ⇱HOME  ↑  ⇲END  ⇑PGUP  ⇓PGDN
# Row 2 (bottom): CTRL  ALT  SHIFT  ⌨KBD  ←  ↓  →  SPACE  ↲ENTER
#
# Popups (swipe up):
#   ⌫BKSP  →  ⌦DEL        ⇑PGUP  →  | (pipe)
#   ⌦DEL   →  ⌫BKSP        ⇓PGDN  →  / (slash)
#   ⇱HOME  →  ~ (tilde)    SPACE   →  _ (underscore)
#   ⇲END   →  $ (dollar)   ↲ENTER →  ; (semicolon)
#
# Apply: cp this to ~/.termux/termux.properties && termux-reload-settings
# ============================================================================

extra-keys = [ \
  [ \
    'ESC', \
    'TAB', \
    {key: 'BKSP', display: '⌫', popup: {key: 'DEL', display: '⌦'}}, \
    {key: 'DEL', display: '⌦', popup: {key: 'BKSP', display: '⌫'}}, \
    {key: 'HOME', display: '⇱', popup: '~'}, \
    'UP', \
    {key: 'END', display: '⇲', popup: '$'}, \
    {key: 'PGUP', display: '⇑', popup: '|'}, \
    {key: 'PGDN', display: '⇓', popup: '/'} \
  ], \
  [ \
    'CTRL', \
    'ALT', \
    'SHIFT', \
    {key: 'KEYBOARD', display: '⌨'}, \
    'LEFT', \
    'DOWN', \
    'RIGHT', \
    'SPACE', \
    {key: 'ENTER', display: '↲'} \
  ] \
]
